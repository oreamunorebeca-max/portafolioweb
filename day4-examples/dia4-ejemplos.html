<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dia4-ejemplos</title>
    <link rel="stylesheet" href="dia4-ejemplos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<!--Menu hamburguesa con js-->
<header class="hamburguesa">
    <h3>LOGO</h3>
    <nav>
        <ul id="menu">
            <li><a href="#">Inicio </a></li>
            <li><a href="#">Catálogo</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>
    <div id="bars">
        <i class="fa-solid fa-bars"></i>
    </div>
</header>
<!--Barra de progreso-->

<div class= barra-progreso>
    <div class="barrita " id="barritaProgreso" ></div>
</div>


<!--Ventana Modal-->

<section class="modal">
        <h1>Ventana Modal en JavaScript</h1>
        <p>Haz clic en el botón para abrir un formulario.</p>
        <button id="abrirModal">Abrir formulario</button>
<!--Esta es la ventanamodal que se va abrir-->
<div class="overlay" id="ventanamodal">
    <div class="caja-modal">
        <button class="btnCerrar" id="btnCerrarJs">X</button>
        <h2>Formulario de contacto</h2>
        <form action="" id="formulario">
            <input type="text" placeholder="Nombre">
            <input type="text" placeholder="Correo electrónico">
            <textarea name="" id="" placeholder="Mensaje" rows="4"></textarea>
            <button>Enviar</button>
        </form>
    </div>

</div>       
</section>

<div class="contenedor-padre">

    <section class="contador">
        <div class="counter">0</div>
        <h3 class="etiqueta">Usuarios registrados</h3>
    </section>

    <section class="contador2">
        <div class="counter">0</div>
        <h3 class="etiqueta">Productos vendidos</h3>
    </section>

    <section class="contador3">
        <div class="counter">0</div>
        <h3 class="etiqueta">Productos exportados</h3>
    </section>

</div>
<!--Carrusel de slider  -->
<section class="slider">
    <div class="slider-box">
        <img class="gallery" src="https://concepto.de/wp-content/uploads/2020/04/mariposa-e1588208139231.jpg" alt="Mariposa1">
        <img class="gallery" src="https://www.anipedia.net/imagenes/significado-mariposas-800x375.jpg" alt="Mariposa2">
        <video  class="gallery" src="images/videodemariposas.mp4" autoplay muted ></video>
        <img class="gallery" src="https://cdn.prod.website-files.com/692da62b1095e881eb691deb/69542a5f1925b64ce6b7fcb3_zoo-martinique-animaux-insectes-papillon-monarque-06.jpg" alt="Mariposa3">
        <img  class="gallery" src="https://cienciaybiologia.com/wp-content/uploads/2015/06/mariposa-monarca-600x450.jpg" alt="mariposa4">

    </div>
    <button id="btnPrev"><i class="fa-solid fa-angle-left"></i></button>
    <button id="btnNext"><i class="fa-solid fa-angle-right"></i></button>
</section>
<!--Galeria interactiva-->
<section>
<section class="interactiva">
    <h2>Galeria interactiva</h2>
    <div class="filtros">
        <button data-filter="todo">Todo</button>
        <button data-filter="Turismo">Turismo</button>
        <button data-filter="Tienda">Tienda</button>
        <button data-filter="Exportaciones">Exportaciones</button>
</div>
<div class="fotos">
<img class="item Turismo " src="https://static.wixstatic.com/media/0e7f19_1fecd884bbff46d3b4482e596b0972b4~mv2.png/v1/fill/w_560,h_400,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/0e7f19_1fecd884bbff46d3b4482e596b0972b4~mv2.png" alt="">
<img class="item Turismo "src="https://media.tacdn.com/media/attractions-splice-spp-674x446/0a/92/c9/db.jpg" alt="">
<img class="item Turismo "src="https://turismoenelejecafetero.com/wp-content/uploads/Jard%C3%ADn-Bot%C3%A1nico-y-Mariposario/jardin-botanico-mariposario-19.jpg" alt="">
<img class="item Turismo "src="https://www.lateja.cr/resizer/v2/2TRBH3UNCNH3NGAFB6KBZBZUC4.png?width=1200&height=900&smart=true&auth=da1d2ea486070f998c795edda568352e681920dafe24893040b7829782573bfa" alt="">
<img class="item Tienda "src="https://media-cdn.tripadvisor.com/media/photo-s/1a/ef/ee/42/ha-sido-una-experiencia.jpg" alt="">
<img class="item Tienda " src="https://www.elfinancierocr.com/resizer/v2/BYFFOBMLX5AFLOEXG2JTH4XNIM.JPG?smart=true&auth=88a7895e7a8b59dbbc200bcc32674ab933fd92d96aaf9779daf9fc3ffdd21ab8&width=853&height=667" alt="">
<img class="item Tienda " src="https://cdn.prod.website-files.com/68b1de7f5386e98bd20233dd/691d6aca00b9ff4cebec7ad1_store.jpg" alt="">
<img class="item Tienda " src="https://costaricabutterflyfarm.com/wp-content/uploads/2025/05/IMG_2195-scaled.jpg" alt="">
<img class="item Exportaciones "src="https://i0.wp.com/efe.com/wp-content/uploads/2023/08/AME1234-PANAMA-MARIPOSAS.jpg?resize=980%2C654&ssl=1" alt="">
<img class="item Exportaciones "src="https://www.ucr.ac.cr/medios/fotos/2019/pupa-015c8a958ec4737.jpg" alt="">
<img class="item Exportaciones " src="https://www.museocostarica.go.cr/wp-content/uploads/articulos_educativos/historia_natural/mariposas-comercio/phoebis-sennae.jpg" alt="">
<img class="item Exportaciones " src="https://accionsocial.ucr.ac.cr/sites/default/files/imagenes/galerias/img_1850.jpg" alt="">
</div>
<!--Lightbox-->
<div class="lightbox" id="lightbox">
    <img  id="lightbox-img" src=""  alt="">
</div>
</section>

    <script src="dia4-ejemplos.js"></script>
    
</body>
</html>
