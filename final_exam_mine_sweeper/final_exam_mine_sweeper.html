<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Sweeper</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
        }

        h1 {
            margin: 15px 0;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #info {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            background: #16213e;
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #0f3460;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #info div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label {
            color: #a3a3a3;
            font-size: 14px;
            text-transform: uppercase;
        }

        canvas {
            border: 4px solid #0f3460;
            background: grey;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Mine Sweeper</h1>

    <div id="info">
        <div><span class="label">Puntos:</span> <span id="score">0</span></div>
        <div><span class="label">Nivel:</span> <span id="level">1</span></div>
        <div><span class="label">Tiempo:</span> <span id="timer">30s</span></div>
        <div><span class="label">Vidas:</span> <span id="lives">❤️❤️❤️</span></div>
    </div>

    <canvas id="game" width="800" height="800"></canvas>

    <script src="final_exam_mine_sweeper.js"></script>

</body>
</html>
